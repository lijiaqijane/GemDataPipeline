# Code Agent Configuration
# This file controls the entire pipeline: triple generation + task generation + repo crawling

# ===== Repo Crawler Settings =====
repo_crawler:
  # Repository filtering criteria
  filters:
    # Programming languages to search for (e.g., Python, JavaScript, Go, Rust)
    languages:
      - Python
    
    # Star count range
    stars:
      min: 50
      max: 1000000
    
    # Repository size in KB
    size:
      max: 204800  # 200MB
    
    # Code line count range (estimated)
    line_count:
      min: 200
      max: 50000
    
    # Recently updated within days
    updated_within_days: 730  # 2 years
    
    # Required topics/tags
    topics: []
    
    # Exclude repositories with these keywords
    exclude_keywords: []
    
    # Exclude repositories with these topics
    exclude_topics: []

    # Explicitly exclude these repositories by full name (owner/repo)
    # Example:
    #   exclude_repos:
    #     - psf/requests
    #     - numpy/numpy
    exclude_repos:
      - astropy/astropy
      - django/django
      - matplotlib/matplotlib
      - mwaskom/seaborn
      - pallets/flask
      - psf/requests
      - pydata/xarray
      - pylint-dev/pylint
      - pytest-dev/pytest
      - scikit-learn/scikit-learn
      - sphinx-doc/sphinx
      - sympy/sympy
    
    # Check for pytest test files
    require_pytest: false
    
    # Require repository to have main package (folder with same name as repo in root directory)
    # e.g., numpy repo must have numpy/ folder in root
    require_main_package: false
    
    # Maximum number of repositories to crawl
    max_repos: 100
    
    # Maximum number of pages to search per query (prevents infinite crawling)
    # Each page contains up to 30 results, so max_pages: 10 means max 300 results per query
    # Recommended: 5-20 pages depending on your needs
    max_pages: 200
  
  # Output settings
  output:
    # Directory to save repository information and code
    save_dir: taskdb/code_agent/repos
    
    # Save repository metadata as JSON
    save_metadata: true
    
    # Clone repository codebase
    clone_codebase: false
    
    # Use shallow clone (depth=1) to save space
    shallow_clone: true
    
    # Save README.md
    save_readme: true
  
  # GitHub API settings
  github:
    # GitHub token (reads from GITHUB_TOKEN env var if not set)
    token: null
    
    # Request timeout in seconds
    timeout: 30
    
    # Sleep between requests to avoid rate limiting (seconds)
    sleep_between_requests: 1

# ===== PR Extractor Settings =====
pr_extractor:
  # List of repositories to extract PRs from (format: owner/repo)
  # Can be a list or comma-separated string
  # Example:
  #   repos:
  #     - scikit-learn/scikit-learn
  #     - pallets/flask
  repos: []

  # Optional: load repositories from RepoCrawler output summary.
  # If 'repos' above is empty and this path is set, PRExtractor will read
  # the RepoCrawler summary.json and use its "repositories[*].full_name"
  # as the repo list.
  # You can point either to the summary.json file itself, or to the
  # directory that contains it (RepoCrawler save_dir).
  # For example, with repo_crawler.output.save_dir: taskdb/code_agent/repos,
  # the corresponding summary file is taskdb/code_agent/repos/summary.json.
  repos_from_repo_crawler_summary: taskdb/code_agent/repos/summary.json
  
  # Output settings
  output:
    # Directory to save extracted PR data
    save_dir: taskdb/code_agent/prs
    
    # Overwrite existing PR files if they exist
    overwrite_existing: false
  
  # Task instance generation settings
  # Whether to generate task instances from extracted PRs
  generate_tasks: true
  
  # Directory to save task instances (defaults to ../tasks relative to prs directory)
  task_output_dir: taskdb/code_agent/candidate_tasks
  
  # PR filtering settings
  # Maximum number of PRs to extract per repository (null = no limit)
  max_pulls: 1000
  
  # Cutoff date for PRs to consider (format: YYYYMMDD, null = no cutoff)
  # Only PRs created before this date will be extracted
  cutoff_date: null
  
  # GitHub API settings
  github:
    # GitHub token (reads from GITHUB_TOKEN env var if not set)
    token: null
    
    # Multiple tokens for parallelization (reads from GITHUB_TOKENS env var if not set)
    # Can be a list or comma-separated string
    tokens: null
  
  # PR query settings
  # PR state: "open", "closed", or "all"
  state: closed
  
  # Sort field: "created", "updated", "popularity"
  sort: created
  
  # Sort direction: "asc" or "desc"
  direction: desc
  
  # Parallelization settings
  # Whether to use parallel processing with multiple tokens
  use_parallel: false


# ===== Task Execution Settings =====
task_execution:
  # Output directory for task execution results
  output_dir: taskdb/code_agent/results  # Required: Path to output directory
  
  # Maximum number of iterations for agent workflow
  max_iteration_num: 10
  
  # Parallel processing settings
  num_processes: 1  # Number of parallel processes (1 = serial execution)
  
  # Task timeout in seconds
  task_timeout_seconds: 5400  # 90 minutes
  
  # Task input settings
  # Task mapping file path (required)
  # Supports both JSON and JSONL formats
  tasks_map_file: taskdb/code_agent/candidate_tasks/nvbn-thefuck-task-instances.jsonl  # Required: Path to tasks map file
  
  # Root directory where repository caches and task directories will be created
  setup_dir: taskdb/code_agent/setup  # Required: Path to setup directory
  
  # Task selection mode (mutually exclusive)
  # Option 1: Process a single task
  task_id: null  # Single task ID to process
  
  # Option 2: Process tasks from a list file
  task_list_file: null  # Path to file containing task IDs (one per line)
  
  # Option 3: Process a batch of tasks
  task_batch: -1  # Batch size (number of tasks per batch)
  batch_index: -1  # Batch index (1-based, e.g., 1 for first batch)
  
  # Repository cache settings
  cache:
    # Whether to use existing cache (skip cloning if cache exists)
    use_cache: true
    
    # Cache directory naming format
    # Available placeholders: {repo}
    cache_name_format: "{repo}_cache"
  
  # Task directory settings
  task_dir:
    # Task directory naming format
    # Available placeholders: {task_id}, {timestamp}
    name_format: "{task_id}_{timestamp}"
    
    # Timestamp format for task directories
    timestamp_format: "%Y-%m-%d_%H-%M-%S"
  
  # Agent configuration
  agents:
  
    # Disable context retrieval agent
    disable_context_retrieval: false

    # Use Ubuntu-only base images for Dockerfile
    using_ubuntu_only: true
  
  # Output organization
  organize_output: false  # Whether to organize output after completion
