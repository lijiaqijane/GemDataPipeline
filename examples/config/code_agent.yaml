# Code Agent Configuration
# This file controls the entire pipeline: triple generation + task generation + repo crawling

# ===== Repo Crawler Settings =====
repo_crawler:
  # Repository filtering criteria
  filters:
    # Programming languages to search for (e.g., Python, JavaScript, Go, Rust)
    languages:
      - Python
    
    # Star count range
    stars:
      min: 100
      max: 1000000
    
    # Repository size in KB
    size:
      max: 51200  # 50MB
    
    # Code line count range (estimated)
    line_count:
      min: 500
      max: 50000
    
    # Recently updated within days
    updated_within_days: 730  # 2 years
    
    # Required topics/tags
    topics:
      - tool
    
    # Exclude repositories with these keywords
    exclude_keywords: []
    
    # Exclude repositories with these topics
    exclude_topics: []
    
    # Check for pytest test files
    require_pytest: false
    
    # Maximum number of repositories to crawl
    max_repos: 5
    
    # Maximum number of pages to search per query (prevents infinite crawling)
    # Each page contains up to 30 results, so max_pages: 10 means max 300 results per query
    # Recommended: 5-20 pages depending on your needs
    max_pages: 10
  
  # Output settings
  output:
    # Directory to save repository information and code
    save_dir: taskdb/code_agent/crawled_repos
    
    # Save repository metadata as JSON
    save_metadata: true
    
    # Clone repository codebase
    clone_codebase: true
    
    # Use shallow clone (depth=1) to save space
    shallow_clone: true
    
    # Save README.md
    save_readme: true
  
  # GitHub API settings
  github:
    # GitHub token (reads from GITHUB_TOKEN env var if not set)
    token: null
    
    # Request timeout in seconds
    timeout: 30
    
    # Sleep between requests to avoid rate limiting (seconds)
    sleep_between_requests: 1


# ===== Entity Extractor Settings =====
entity_extractor:
  # Supported programming languages
  # Currently supports: Python
  languages:
    - Python
  
  # Maximum number of entities per file
  # -1 means no limit
  max_entities_per_file: -1
  
  # Maximum total entities to extract from repository
  # Limits memory usage for large repositories
  max_entities_per_repo: -1
  
  # Directories to exclude from extraction
  # These are checked with substring matching
  dirs_exclude:
    - test
    - tests
    - spec
    - specs
    - docs
    - examples
    - __pycache__
    - .git
    - venv
    - .venv
    - node_modules
    - build
    - dist
  
  # Directories to include in extraction (empty = include all)
  # If specified, only directories matching these patterns are included
  dirs_include: []
  
  # Exclude test files from extraction
  exclude_test_files: true
  
  # Exclude hidden files (starting with .)
  exclude_hidden_files: true

  # Minimum file line count
  # Files with fewer lines will be skipped
  min_file_line_count: 10
  
  # Maximum file line count
  # Files with more lines will be skipped (-1 means no limit)
  max_file_line_count: 1000
  
  # Minimum entity line count
  # Filters out very small functions/classes
  min_entity_line_count: 10
  
  # Maximum entity line count
  # Filters out very large functions/classes
  max_entity_line_count: 300
  
  # ===== Entity Type Filters =====
  # Include function entities
  include_functions: true
  
  # Include class entities
  include_classes: true
  
  # ===== Entity Name Filters =====
  # Exclude entities with these exact names
  exclude_entity_names:
    - __init__
    - __str__
    - __repr__
  
  # Exclude entities matching these regex patterns
  exclude_entity_patterns:
    - ^test_.*  # Exclude test functions
    - ^_.*_$    # Exclude dunder methods (e.g., __eq__, __lt__)
  
  # ===== Documentation Requirements =====
  # Require entities to have docstrings
  require_docstring: false
  
  # ===== Control Flow Requirements =====
  # Require entities to have these control flows (empty = no requirement)
  # Available: has_if, has_if_else, has_loop, has_exception, has_switch
  require_control_flows: []
    # - has_if
    # - has_loop
  
  # Exclude entities with these control flows
  exclude_control_flows: []
    # - has_exception
  
  # ===== Code Property Requirements =====
  # Require entities to have these properties (empty = no requirement)
  # Available properties from CodeProperty enum:
  #   - has_return, has_function_call, has_assignment, has_import
  #   - has_decorator, has_lambda, has_list_comprehension, has_list_indexing
  #   - has_arithmetic, has_binary_op, has_bool_op, has_unary_op
  #   - has_wrapper, has_parent, has_off_by_one
  require_properties: 
    - has_return
    - has_assignment
  
  # Exclude entities with these properties
  exclude_properties: []
    # - has_decorator
  
  # ===== Complexity Filters =====
  # Minimum cyclomatic complexity (-1 = no limit)
  # Complexity measures the number of decision points in code
  min_complexity: 3
  
  # Maximum cyclomatic complexity (-1 = no limit)
  max_complexity: -1
  
  # Output settings
  output:
    # Directory to save extracted entities
    save_dir: taskdb/code_agent/extracted_entities
    
    # Save entities as JSON
    save_json: false
    
    # Save extraction summary
    save_summary: true


# ===== Triple Generation Settings =====
triple_generation:
  # Repository filtering
  repo_filter:
    stars:
      min: 100
      max: 10000
    size:
      max: 10240  # 10MB
    updated_within_days: 730  # 2 years
    topics:
      - library
      - tool
      - cli
      - data
      - utility
    exclude_keywords:
      - tensorflow
      - pytorch
      - torch
      - keras
      - gpu
      - cuda
      - deep-learning
      - machine-learning
    exclude_topics:
      - machine-learning
      - deep-learning
      - tensorflow
      - pytorch
    max_repos: 50
  
  # File filtering
  file_filter:
    focus_main_package: true
    exclude_directories:
      - tests
      - test
      - docs
      - examples
      - scripts
      - benchmarks
    exclude_files:
      - __init__.py
      - setup.py
      - conftest.py
      - config.py
    line_count:
      min: 50
      max: 2000
      optimal_min: 100
      optimal_max: 500
    min_functions: 2
    scoring:
      line_count_optimal: 20
      function_count: 10
      function_count_max: 50
      docstring: 5
      not_test: 15
      utility_penalty: -10
    utility_keywords:
      - util
      - helper
    max_files_per_repo: 10
  
  # Function filtering
  function_filter:
    skip_private: true
    line_count:
      min: 5
      max: 200
      optimal_min: 10
      optimal_max: 100
    max_arguments: 5
    min_quality_score: 0.3
    scoring:
      line_count_optimal: 0.3
      has_docstring: 0.2
      has_type_hints: 0.1
      has_control_flow: 0.2
      has_return: 0.1
      arg_count_ok: 0.1
  
  # Output settings
  output:
    target_triples: 100
    quality_threshold: 0.5
    cache_dir: triple_cache
    refresh_repos: false



# ===== Task Generation Settings =====

task_generation:
  # Root directory for generated tasks
  taskdb_root: taskdb/
  
  # Task difficulty level (1-3)
  # 1: Easy - Simple function implementations
  # 2: Medium - Moderate complexity with dependencies
  # 3: Hard - Complex logic and error handling
  difficulty: 1
  
  # LLM generation parameters
  max_tokens: 8192      # Maximum tokens for LLM response
  
  # Test generation parameters
  test_generation:
    target_test_count: 4    # Target number of test functions (prefer this number)
    min_test_count: 3       # Minimum acceptable test functions
    max_test_count: 5       # Maximum allowed test functions
  
  # Logging and persistence
  save_logs: true       # Save LLM responses and intermediate results
  auto_save: true       # Automatically save tasks to taskdb

# ===== Batch Processing Settings =====
batch_processing:
  # Number of tasks to generate in batch mode
  num_tasks: 10
  
  # Error handling
  skip_errors: false    # Continue processing on errors (true) or stop (false)
  
  # Maximum retry attempts for failed operations
  max_retries: 5

# ===== Sandbox Configuration =====
sandbox:
  # SandboxFusion URL (null = auto-detect from SANDBOX_FUSION_URL env var)
  sandbox_url: null
  
  # Use Docker runner for code execution
  use_docker_runner: true
  
  # Silent mode (suppress sandbox output)
  silent: false
